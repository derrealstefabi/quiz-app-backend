# This is the SAM template that represents the architecture of your serverless application
# https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/serverless-sam-template-basics.html

# The AWSTemplateFormatVersion identifies the capabilities of the template
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/format-version-structure.html
AWSTemplateFormatVersion: 2010-09-09
Description: >-
  quiz-app-backend

# Transform section specifies one or more macros that AWS CloudFormation uses to process your template
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/transform-section-structure.html
Transform:
- AWS::Serverless-2016-10-31

# Resources declares the AWS resources that you want to include in the stack
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/resources-section-structure.html
Resources:
  # HTTP API
  QuizApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      # CORS configuration - this is open for development only and should be restricted in prod.
      # See https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-property-httpapi-httpapicorsconfiguration.html
      CorsConfiguration:
        AllowMethods:
          - GET
          - POST
          - DELETE
          - OPTIONS
        AllowHeaders:
          - "*"
        AllowOrigins:
          - "*"
      DefaultRouteSettings:
        ThrottlingRateLimit: 5
        ThrottlingBurstLimit: 20
      Auth:
        DefaultAuthorizer: MyCognitoAuthorizer
        Authorizers:
          MyCognitoAuthorizer:
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${MyCognitoUserPool}
              audience:
                - !Ref MyCognitoUserPoolClient
            IdentitySource: "$request.header.Authorization"
            UserPoolArn: !GetAtt MyCognitoUserPool.Arn


  getUserQuizesFunctionToTableConnector:
    Type: AWS::Serverless::Connector # More info about Connector Resource: https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-connector.html
    Properties:
      Source:
        Id: getUserQuizesFunction
      Destination:
        Id: QuizTable
      Permissions:
        - Read

  getByIdFunctionToTableConnector:
    Type: AWS::Serverless::Connector
    Properties:
      Source:
        Id: getByIdFunction
      Destination:
        Id: QuizTable
      Permissions:
        - Read

  saveQuizFunctionToTableConnector:
    Type: AWS::Serverless::Connector
    Properties:
      Source:
        Id: saveQuizFunction
      Destination:
        Id: QuizTable
      Permissions:
        - Write

  createPresignedPostToBucketConnector:
    Type: AWS::Serverless::Connector
    Properties:
      Source:
        Id: getPresignedPostFunction
      Destination:
        Id: S3ImageBucket
      Permissions:
        - Read
        - Write

  createPresignedGetToBucketConnector:
    Type: AWS::Serverless::Connector
    Properties:
      Source:
        Id: getPresignedGetFunction
      Destination:
        Id: S3ImageBucket
      Permissions:
        - Read

  # Each Lambda function is defined by properties:
  # https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction

  # This is a Lambda function config associated with the source code: get-all-items.js
  getUserQuizesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers
      Handler: get_user_quizes.getUserQuizes
      Runtime: python3.10
      MemorySize: 128
      Timeout: 100
      Description: A simple example includes a HTTP get method to get all items from a DynamoDB table.
      Environment:
        Variables:
          # Make table name accessible as environment variable from function code during execution
          QUIZ_TABLE: !Ref QuizTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /quiz
            Method: GET
            ApiId: !Ref QuizApi
  # Each Lambda function is defined by properties:
  # https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction

  # This is a Lambda function config associated with the source code: get-by-id.js
  getByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers
      Handler: get_by_id.getByIdHandler
      Runtime: python3.10
      MemorySize: 128
      Timeout: 100
      Description: A simple example includes a HTTP get method to get one item by id from a DynamoDB table.
      Environment:
        Variables:
          # Make table name accessible as environment variable from function code during execution
          QUIZ_TABLE: !Ref QuizTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /quiz/{id}
            Method: GET
            ApiId: !Ref QuizApi
  # Each Lambda function is defined by properties:
  # https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction

  # This is a Lambda function config associated with the source code: save_quiz.py
  saveQuizFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers
      Handler: save_quiz.saveQuizHandler
      Runtime: python3.10
      MemorySize: 128
      Timeout: 100
      Description: A simple example includes a HTTP post method to add one item to a DynamoDB table.
      Environment:
        Variables:
          # Make table name accessible as environment variable from function code during execution
          QUIZ_TABLE: !Ref QuizTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /quiz
            Method: POST
            ApiId: !Ref QuizApi

  # This is a Lambda function config associated with the source code: create_presigned_post.py
  getPresignedPostFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers
      Handler: create_presigned_post.create_presigned_post
      Runtime: python3.10
      MemorySize: 128
      Timeout: 100
      Description: Create presigned post url for s3.
      Environment:
        Variables:
          # Make table name accessible as environment variable from function code during execution
          BUCKET_NAME: !Ref S3ImageBucket
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /createPresignedPost
            Method: GET
            ApiId: !Ref QuizApi

  # This is a Lambda function config associated with the source code: create_presigned_post.py
  getPresignedGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers
      Handler: create_presigned_get.create_presigned_get
      Runtime: python3.10
      MemorySize: 128
      Timeout: 100
      Description: Create presigned get url for s3.
      Environment:
        Variables:
          # Make table name accessible as environment variable from function code during execution
          BUCKET_NAME: !Ref S3ImageBucket
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /createPresignedGet
            Method: GET
            ApiId: !Ref QuizApi

  # Simple syntax to create a DynamoDB table with a single attribute primary key, more in
  # https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlesssimpletable

  # DynamoDB table to store item: {id: &lt;ID&gt;, name: &lt;NAME&gt;}
  QuizTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: QuizTable
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  S3ImageBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
              - HEAD
              - PUT
              - POST
              - DELETE
            AllowedOrigins:
              - "*"

  MyCognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: MyCognitoUserPool
      Policies:
        PasswordPolicy:
          MinimumLength: 8
      AutoVerifiedAttributes:
        - email
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_CODE # Or CONFIRM_WITH_LINK
        EmailMessage: "Your verification code is {####}."
        EmailSubject: "Verify your account"
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
      # Case sensitivity on the username input for the selected sign-in option.
      UsernameConfiguration:
        CaseSensitive: false


  MyCognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref MyCognitoUserPool
      ClientName: MyCognitoUserPoolClient
      GenerateSecret: false
      AllowedOAuthFlows:
        - code
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      CallbackURLs:
        - https://derrealstefabi.github.io/quiz-app/
      LogoutURLs:
        - https://derrealstefabi.github.io/quiz-app/
      SupportedIdentityProviders:
        - COGNITO


  MyCognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: derrealstefabi-quiz-app  # Must be globally unique
      UserPoolId: !Ref MyCognitoUserPool


Outputs:
  WebEndpoint:
    Description: "API Gateway endpoint URL for Prod stage"
    Value: !Sub "https://${QuizApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}"
  CognitoEndpoint:
    Description: "Cognito URL"
    Value: !Sub "https://derrealstefabi-quiz-app.auth.${AWS::Region}.amazoncognito.com/login?client_id=${MyCognitoUserPoolClient}&response_type=token&scope=email+openid+profile&redirect_uri=http://localhost:4321"
  AwsRegion:
    Description: "Aws Region"
    Value: !Ref AWS::Region
  CognitoUserPoolId:
    Description: "CognitoUserPoolId"
    Value: !Ref MyCognitoUserPool
  CognitoClientId:
    Description: "CognitoClientId"
    Value: !Ref MyCognitoUserPoolClient
  CognitoDomain :
    Description: "CognitoDomain"
    Value: !Sub "derrealstefabi-quiz-app.auth.${AWS::Region}.amazoncognito.com"
